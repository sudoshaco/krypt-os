name: CI + ISO Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: Rust CI Gate (läuft bei jedem Push + PR)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  rust-ci:
    name: Rust — test + clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust-Toolchain einrichten
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cargo-Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: System-Abhängigkeiten (wayland + udev)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev libudev-dev pkg-config

      - name: cargo clippy — -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: ISO Build (nur bei Tags oder manuell, nach CI-Gate)
  # ─────────────────────────────────────────────────────────────────────────────
  build-iso:
    name: ISO Build
    needs: rust-ci
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    container:
      image: archlinux:latest
      options: --privileged  # mkarchiso braucht loop-Devices

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # für git describe --tags

      - name: System vorbereiten (pacman)
        run: |
          pacman-key --init
          pacman-key --populate
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            archiso xorriso mtools dosfstools squashfs-tools \
            git base-devel \
            rustup

      - name: Rust-Toolchain installieren
        run: |
          rustup default stable
          rustup component add clippy

      - name: Cargo-Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Wayland-Abhängigkeiten (für gui-protocol)
        run: |
          pacman -S --noconfirm wayland wayland-protocols

      - name: cargo clippy (final check)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test (final check)
        run: cargo test --workspace

      - name: cargo build --release
        run: cargo build --release

      - name: ISO-Profil aufbauen
        run: |
          # Binaries in erwarteten Pfad (als root build)
          ls -la target/release/krypt-daemon target/release/krypt-stick \
                 target/release/krypt-gui target/release/krypt-panic

          # Rust nicht nochmal bauen (Binaries liegen vor)
          bash build/build.sh --skip-rust --output /tmp/krypt-output
        env:
          KRYPT_VERSION: ${{ github.ref_name }}

      - name: ISO signieren (GPG)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if [[ -n "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "${GPG_PRIVATE_KEY}" | gpg --import
            gpg --batch --yes --detach-sign --armor /tmp/krypt-output/*.iso
            echo "ISO signiert"
          else
            echo "GPG_PRIVATE_KEY nicht gesetzt — Signierung übersprungen"
          fi
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: krypt-os-${{ github.ref_name }}
          path: |
            /tmp/krypt-output/*.iso
            /tmp/krypt-output/*.sha256
            /tmp/krypt-output/*.iso.asc
          retention-days: 30
          if-no-files-found: error

      - name: GitHub Release erstellen
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/krypt-output/*.iso
            /tmp/krypt-output/*.sha256
            /tmp/krypt-output/*.iso.asc
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          body: |
            ## Krypt OS ${{ github.ref_name }}

            > Cryptography-first. Compartmentalization by design. Lightweight by discipline.

            **Status:** Frühe Entwicklungsversion — nicht für Produktivbetrieb geeignet.

            ### Installieren

            ```bash
            # SHA256 prüfen
            sha256sum -c krypt-os-${{ github.ref_name }}.sha256

            # Auf USB schreiben
            dd if=krypt-os-${{ github.ref_name }}.iso of=/dev/sdX bs=4M status=progress oflag=sync
            ```

            ### Vollständige Installationsanleitung

            → [docs/install.md](https://github.com/${{ github.repository }}/blob/main/docs/install.md)

            ### Änderungen

            → [PROGRESS.md](https://github.com/${{ github.repository }}/blob/main/PROGRESS.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Shell-Script Syntax-Check
  # ─────────────────────────────────────────────────────────────────────────────
  shell-check:
    name: Shell — syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck installieren
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck
        run: |
          # Sammelt *.sh + Skripte ohne Endung, die einen Shell-Shebang
          # haben (bash/sh/ash/dash/zsh). Vorher (Commit 36982e8) hat
          # die Pipeline nur *.sh erfasst → Branding- und initramfs-
          # Scripts waren CI-unsichtbar.
          #
          # Die awk-Regex nutzt POSIX-Charakterklassen statt \b — GNU awk
          # 5.x liefert \b NICHT in Regex-Patterns. Vorherige Iteration
          # (auch in 36982e8) hat darum stillschweigend NICHTS gematcht
          # und fiel auf reine *.sh-Coverage zurück.
          #
          # Zwei find+sort Pässe + Temp-Files damit beide Listen vollständig
          # vorliegen bevor sort -u sie kombiniert. Eine Brace-Group mit
          # nachgeschaltetem Pipeline (`{ A; B; } | sort -u`) hat zwischen
          # A=find und B=find|xargs|awk eine Race-Condition — sort hat
          # bei lokalem Test reproduzierbar 4 Einträge verloren.
          find . -type f -name "*.sh" -not -path "*/target/*" -not -path "*/.git/*" \
            > /tmp/scripts-sh.txt
          find . -type f -not -name "*.sh" -not -path "*/target/*" -not -path "*/.git/*" -print0 \
            | xargs -0 awk 'FNR==1 && /^#![[:space:]]*\/([^[:space:]]+\/)?(env[[:space:]]+)?(ba|a|da|z|k)?sh([[:space:]]|$)/ { print FILENAME }' \
            > /tmp/scripts-shebang.txt
          mapfile -t SCRIPTS < <(sort -u /tmp/scripts-sh.txt /tmp/scripts-shebang.txt)
          printf '  → %s\n' "${SCRIPTS[@]}"
          # Severity=error: nur echte Fehler killen die CI; Style-Hinweise
          # bleiben informativ ohne Build zu blocken (bewusste Entscheidung,
          # damit der Build-Gate nicht an SC2086-Quoting-Style hängt).
          # --exclude SC1090,SC1091 — Dynamic source paths in install.sh
          shellcheck --severity=error --exclude=SC1090,SC1091 "${SCRIPTS[@]}"
          # bash -n als zusätzlicher Syntax-Gate (außer für ash/dash, die
          # nutzen busybox-Subsets die bash nicht parsen kann — siehe
          # initramfs/hooks/krypt).
          for f in "${SCRIPTS[@]}"; do
            shebang=$(head -1 "$f")
            case "$shebang" in
              *ash*|*dash*) sh -n "$f" 2>/dev/null || dash -n "$f" || true ;;
              *)            bash -n "$f" ;;
            esac
          done
          echo "Syntax: OK (${#SCRIPTS[@]} scripts geprüft)"
