# hyprland.conf — Krypt OS
# VM-Fenster bekommen farbige Border je Trust-Level
# Catppuccin Mocha Theme

# ===== Monitor =====
monitor=,preferred,auto,1

# ===== Allgemein =====
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(313244aa)
    layout = dwindle
}

# ===== Aussehen =====
# Schatten-Syntax: Hyprland 0.45 hat den flachen Block (drop_shadow,
# shadow_range, shadow_render_power, col.shadow) durch einen verschachtelten
# `shadow { … }` ersetzt. Auf 0.45+ gibt der alte Block Deprecation-Notices
# bei jedem hyprctl reload — auf 0.50+ wird er voraussichtlich ignoriert.
decoration {
    rounding = 10
    blur {
        enabled = true
        size = 8
        passes = 2
    }
    shadow {
        enabled      = true
        range        = 8
        render_power = 2
        color        = rgba(1a1a2e99)
    }
}

# ===== Animationen (ausgelagert) =====
source = ~/.config/hypr/animations.conf

# ===== VM-Border-Regeln je Trust-Level =====
#
# Fenster-Titel-Konvention: "[<trust>] <vm-name>: <window-title>"
# krypt-gui-protocol setzt diesen Titel automatisch pro AppVM-Fenster.

# --- Border-Farben ---
windowrule   = bordercolor rgba(a6e3a1ff) rgba(40a02baa) 45deg, title:^(\[green\].*)$
windowrule   = bordercolor rgba(f9e2afff) rgba(df8e1daa) 45deg, title:^(\[yellow\].*)$
windowrule   = bordercolor rgba(fab387ff) rgba(fe640baa) 45deg, title:^(\[orange\].*)$
windowrule   = bordercolor rgba(f38ba8ff) rgba(e64553aa) 45deg, title:^(\[red\].*)$
windowrule   = bordercolor rgba(cba6f7ff) rgba(8839efaa) 45deg, title:^(\[black\].*)$

# --- Schatten-Farbe korrespondiert mit Border (zusätzlicher visueller Cue) ---
windowrule   = col.shadow rgba(a6e3a133), title:^(\[green\].*)$
windowrule   = col.shadow rgba(f9e2af33), title:^(\[yellow\].*)$
windowrule   = col.shadow rgba(fab38733), title:^(\[orange\].*)$
windowrule   = col.shadow rgba(f38ba833), title:^(\[red\].*)$
windowrule   = col.shadow rgba(cba6f733), title:^(\[black\].*)$

# --- Opacity: niedrigeres Trust = leicht transparenter (subtiler Sicherheits-Cue) ---
# active / inactive
windowrule   = opacity 1.0 0.90, title:^(\[green\].*)$
windowrule   = opacity 0.97 0.87, title:^(\[yellow\].*)$
windowrule   = opacity 0.94 0.84, title:^(\[orange\].*)$
windowrule   = opacity 0.90 0.80, title:^(\[red\].*)$
# Vault: vollständig opaque — kein Durchscheinen durch Blur
windowrule   = opacity 1.0 0.95, title:^(\[black\].*)$

# --- Blur: red/orange deaktivieren (kein Inhalt soll durch den Hintergrund schimmern) ---
windowrule   = noblur, title:^(\[red\].*)$
windowrule   = noblur, title:^(\[orange\].*)$

# --- Vault: keine Animationen (kein visuelles "Flair" für den sichersten Bereich) ---
windowrule   = noanim, title:^(\[black\].*)$

# --- Workspace-Zuweisung (per Trust-Level, nicht VM-Name) ---
#   ws 1 — red     untrusted (browser, scratch)
#   ws 2 — yellow  medium
#   ws 3 — green   trusted (work, personal, sys-gui)
#   ws 4 — orange  low-trust (hacking, gaming)
#   ws 9 — black   vault (silent: kein Auto-Focus)
windowrule   = workspace 1, title:^(\[red\].*)$
windowrule   = workspace 2, title:^(\[yellow\].*)$
windowrule   = workspace 3, title:^(\[green\].*)$
windowrule   = workspace 4, title:^(\[orange\].*)$
windowrule   = workspace 9 silent, title:^(\[black\].*)$

# --- Suppress maximize-Events (AppVM-Fenster haben eigene Größe) ---
windowrule   = suppressevent maximize, title:^(\[green\].*)$
windowrule   = suppressevent maximize, title:^(\[yellow\].*)$
windowrule   = suppressevent maximize, title:^(\[orange\].*)$
windowrule   = suppressevent maximize, title:^(\[red\].*)$
windowrule   = suppressevent maximize, title:^(\[black\].*)$

# --- Layer-Regeln (Waybar, Benachrichtigungen) ---
layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = blur, notifications

# --- Screensaver (KRYPT-Logo via tte in foot) ---
# foot wird mit --app-id=org.krypt.screensaver gestartet (siehe
# dotfiles/branding/krypt-launch-screensaver). Wir machen das Fenster
# fullscreen, ohne Border und ohne Animationen, damit nur das ASCII-Logo
# auf reinem Schwarz erscheint. noblur verhindert Performance-Drops bei 120fps.
windowrule   = fullscreen, class:^(org.krypt.screensaver)$
windowrule   = noborder, class:^(org.krypt.screensaver)$
windowrule   = noanim, class:^(org.krypt.screensaver)$
windowrule   = noblur, class:^(org.krypt.screensaver)$
windowrule   = float, class:^(org.krypt.screensaver)$
windowrule   = pin, class:^(org.krypt.screensaver)$

# ===== Keybinds =====
$mod = SUPER

# VM-Launcher via Rofi
# Hyprland exec parst keinen Tilde — rofi's -modi-Arg muss expandiert sein.
bind = $mod, Space, exec, sh -c 'rofi -show krypt-vms -modi krypt-vms:"$HOME/.config/rofi/krypt-launcher.sh"'

# Standard
bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod SHIFT, F, togglefloating
bind = $mod, Return, exec, foot

# Screensaver (KRYPT-Logo, manuell startbar)
bind = $mod SHIFT, S, exec, krypt-launch-screensaver force

# Workspaces 1–10
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Direktzugriff: Vault-Workspace (schwärzester Bereich)
bind = $mod SHIFT, V, workspace, 9

# Fenster auf Workspace schieben (ohne folgen)
bind = $mod SHIFT, 1, movetoworkspacesilent, 1
bind = $mod SHIFT, 2, movetoworkspacesilent, 2
bind = $mod SHIFT, 3, movetoworkspacesilent, 3
bind = $mod SHIFT, 4, movetoworkspacesilent, 4
bind = $mod SHIFT, 9, movetoworkspacesilent, 9

# Focus-Switching
bind = $mod, Tab,       cyclenext
bind = $mod SHIFT, Tab, cyclenext, prev

# ===== Autostart =====
exec-once = waybar
exec-once = dunst
# hypridle: triggert Screensaver, Lock, DPMS off nach Idle-Timeouts
# (siehe ~/.config/hypr/hypridle.conf)
exec-once = hypridle
