# hyprland.conf — Krypt OS
# VM-Fenster bekommen farbige Border je Trust-Level
# Catppuccin Mocha Theme

# ===== Monitor =====
monitor=,preferred,auto,1

# ===== Allgemein =====
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(313244aa)
    layout = dwindle
}

# ===== Aussehen =====
decoration {
    rounding = 10
    blur {
        enabled = true
        size = 8
        passes = 2
    }
    drop_shadow = true
    shadow_range = 8
    shadow_render_power = 2
    col.shadow = rgba(1a1a2e99)
}

# ===== Animationen (ausgelagert) =====
source = ~/.config/hypr/animations.conf

# ===== VM-Border-Regeln je Trust-Level =====
#
# Fenster-Titel-Konvention: "[<trust>] <vm-name>: <window-title>"
# krypt-gui-protocol setzt diesen Titel automatisch pro AppVM-Fenster.

# --- Border-Farben ---
windowrulev2 = bordercolor rgba(a6e3a1ff) rgba(40a02baa) 45deg, title:^(\[green\].*)$
windowrulev2 = bordercolor rgba(f9e2afff) rgba(df8e1daa) 45deg, title:^(\[yellow\].*)$
windowrulev2 = bordercolor rgba(fab387ff) rgba(fe640baa) 45deg, title:^(\[orange\].*)$
windowrulev2 = bordercolor rgba(f38ba8ff) rgba(e64553aa) 45deg, title:^(\[red\].*)$
windowrulev2 = bordercolor rgba(cba6f7ff) rgba(8839efaa) 45deg, title:^(\[black\].*)$

# --- Schatten-Farbe korrespondiert mit Border (zusätzlicher visueller Cue) ---
windowrulev2 = col.shadow rgba(a6e3a133), title:^(\[green\].*)$
windowrulev2 = col.shadow rgba(f9e2af33), title:^(\[yellow\].*)$
windowrulev2 = col.shadow rgba(fab38733), title:^(\[orange\].*)$
windowrulev2 = col.shadow rgba(f38ba833), title:^(\[red\].*)$
windowrulev2 = col.shadow rgba(cba6f733), title:^(\[black\].*)$

# --- Opacity: niedrigeres Trust = leicht transparenter (subtiler Sicherheits-Cue) ---
# active / inactive
windowrulev2 = opacity 1.0 0.90, title:^(\[green\].*)$
windowrulev2 = opacity 0.97 0.87, title:^(\[yellow\].*)$
windowrulev2 = opacity 0.94 0.84, title:^(\[orange\].*)$
windowrulev2 = opacity 0.90 0.80, title:^(\[red\].*)$
# Vault: vollständig opaque — kein Durchscheinen durch Blur
windowrulev2 = opacity 1.0 0.95, title:^(\[black\].*)$

# --- Blur: red/orange deaktivieren (kein Inhalt soll durch den Hintergrund schimmern) ---
windowrulev2 = noblur, title:^(\[red\].*)$
windowrulev2 = noblur, title:^(\[orange\].*)$

# --- Vault: keine Animationen (kein visuelles "Flair" für den sichersten Bereich) ---
windowrulev2 = noanim, title:^(\[black\].*)$

# --- Workspace-Zuweisung (per Trust-Level, nicht VM-Name) ---
#   ws 1 — red     untrusted (browser, scratch)
#   ws 2 — yellow  medium
#   ws 3 — green   trusted (work, personal, sys-gui)
#   ws 4 — orange  low-trust (hacking, gaming)
#   ws 9 — black   vault (silent: kein Auto-Focus)
windowrulev2 = workspace 1, title:^(\[red\].*)$
windowrulev2 = workspace 2, title:^(\[yellow\].*)$
windowrulev2 = workspace 3, title:^(\[green\].*)$
windowrulev2 = workspace 4, title:^(\[orange\].*)$
windowrulev2 = workspace 9 silent, title:^(\[black\].*)$

# --- Suppress maximize-Events (AppVM-Fenster haben eigene Größe) ---
windowrulev2 = suppressevent maximize, title:^(\[green\].*)$
windowrulev2 = suppressevent maximize, title:^(\[yellow\].*)$
windowrulev2 = suppressevent maximize, title:^(\[orange\].*)$
windowrulev2 = suppressevent maximize, title:^(\[red\].*)$
windowrulev2 = suppressevent maximize, title:^(\[black\].*)$

# --- Layer-Regeln (Waybar, Benachrichtigungen) ---
layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = blur, notifications

# ===== Keybinds =====
$mod = SUPER

# VM-Launcher via Rofi
# Hyprland exec parst keinen Tilde — rofi's -modi-Arg muss expandiert sein.
bind = $mod, Space, exec, sh -c 'rofi -show krypt-vms -modi krypt-vms:"$HOME/.config/rofi/krypt-launcher.sh"'

# Standard
bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod SHIFT, F, togglefloating
bind = $mod, Return, exec, foot

# Workspaces 1–10
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Direktzugriff: Vault-Workspace (schwärzester Bereich)
bind = $mod SHIFT, V, workspace, 9

# Fenster auf Workspace schieben (ohne folgen)
bind = $mod SHIFT, 1, movetoworkspacesilent, 1
bind = $mod SHIFT, 2, movetoworkspacesilent, 2
bind = $mod SHIFT, 3, movetoworkspacesilent, 3
bind = $mod SHIFT, 4, movetoworkspacesilent, 4
bind = $mod SHIFT, 9, movetoworkspacesilent, 9

# Focus-Switching
bind = $mod, Tab,       cyclenext
bind = $mod SHIFT, Tab, cyclenext, prev

# ===== Autostart =====
exec-once = waybar
exec-once = dunst
