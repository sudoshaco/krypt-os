# ~/.config/hypr/hyprlock.conf — Krypt OS Lockscreen
# hyprlock: https://github.com/hyprwm/hyprlock
#
# Layout:
#   - Hintergrund: Catppuccin Mocha Crust (#11111b) mit leichtem Blur
#   - Oben links: Krypt ASCII-Logo (klein, subtil)
#   - Mitte: Zeit (groß) + Datum (klein)
#   - Mitte unten: Auth-Input-Field (Krypt-Violett)
#   - Unten: Failure-Text
#
# Hinweis: krypt-daemon wartet parallel auf Auth-Stick.
# hyprlock sichert den Wayland-Session-Layer.

general {
    grace      = 0          # sofort sperren, kein Grace-Period
    hide_cursor = true
    no_fade_in  = false
    ignore_empty_input = false
}

# ─────────────────────────────────────────────────────────────────────────────
# HINTERGRUND
# ─────────────────────────────────────────────────────────────────────────────
background {
    monitor =
    # Kein Wallpaper-Bild — Solid Color für minimalen Look
    # MOCHA_CRUST = #11111b — die Komma-Form von hyprlock erwartet Dezimal-RGB.
    # Vorher: "rgba(11, 11, 27, 1.0)" wurde als RGB(11,11,27) = #0B0B1B
    # interpretiert (Hex-Zeichen versehentlich als Dezimal eingesetzt) und
    # ergab einen merklich dunkleren Hintergrund als der restliche Theme-Stack.
    color = rgba(17, 17, 27, 1.0)       # MOCHA_CRUST #11111b

    # Optional: Blur über laufende Fenster (blur_passes = 0 = disabled)
    blur_passes  = 3
    blur_size    = 8
    noise        = 0.012
    contrast     = 0.90
    brightness   = 0.75
    vibrancy     = 0.15
    vibrancy_contrast = 0.05
}

# ─────────────────────────────────────────────────────────────────────────────
# KRYPT ASCII-LOGO (oben zentriert, klein)
# ─────────────────────────────────────────────────────────────────────────────
label {
    monitor =
    text = ██╗  ██╗██████╗ ██╗   ██╗██████╗ ████████╗\n██║ ██╔╝██╔══██╗╚██╗ ██╔╝██╔══██╗╚══██╔══╝\n█████╔╝ ██████╔╝ ╚████╔╝ ██████╔╝   ██║\n██╔═██╗ ██╔══██╗  ╚██╔╝  ██╔═══╝    ██║\n██║  ██╗██║  ██║   ██║   ██║        ██║\n╚═╝  ╚═╝╚═╝  ╚═╝   ╚═╝   ╚═╝        ╚═╝
    color    = rgba(157, 78, 221, 0.60)   # krypt-violet dim
    font_size = 8
    font_family = JetBrainsMono Nerd Font
    position = 0, -80
    halign   = center
    valign   = top
}

# ─────────────────────────────────────────────────────────────────────────────
# UHRZEIT
# ─────────────────────────────────────────────────────────────────────────────
label {
    monitor =
    text     = cmd[update:1000] echo -e "$(date +'%H:%M')"
    color    = rgba(205, 214, 244, 1.0)   # MOCHA_TEXT
    font_size = 90
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 60
    halign   = center
    valign   = center
}

# ─────────────────────────────────────────────────────────────────────────────
# DATUM
# ─────────────────────────────────────────────────────────────────────────────
label {
    monitor =
    text     = cmd[update:60000] echo -e "$(date +'%A, %d. %B %Y')"
    color    = rgba(186, 194, 222, 0.75)  # MOCHA_SUBTEXT1
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -20
    halign   = center
    valign   = center
}

# ─────────────────────────────────────────────────────────────────────────────
# AUTH INPUT FIELD
# ─────────────────────────────────────────────────────────────────────────────
input-field {
    monitor =
    size     = 320, 52
    position = 0, -140
    halign   = center
    valign   = center

    outline_thickness   = 2
    outer_color         = rgba(157, 78, 221, 1.0)     # krypt-violet
    inner_color         = rgba(30, 30, 46, 0.95)      # MOCHA_BASE
    font_color          = rgba(205, 214, 244, 1.0)
    font_family         = JetBrainsMono Nerd Font

    placeholder_text    = <i>Auth PIN oder Passwort</i>
    hide_input          = false
    dots_center         = true
    dots_size           = 0.26
    dots_spacing        = 0.18
    dots_fadeout        = true

    rounding            = 10
    fade_on_empty       = true
    fade_timeout        = 1000

    # Capslock-Warnung
    capslock_color      = rgba(249, 226, 175, 1.0)    # MOCHA_YELLOW
    numlock_color       = rgba(166, 227, 161, 1.0)    # MOCHA_GREEN

    # Fehler-Farbe (falsches Passwort)
    fail_color          = rgba(243, 139, 168, 1.0)    # MOCHA_RED
    fail_text           = <b>Authentifizierung fehlgeschlagen</b>
    fail_transition     = 300

    check_color         = rgba(157, 78, 221, 1.0)
}

# ─────────────────────────────────────────────────────────────────────────────
# HINT: Auth-Stick-Hinweis
# ─────────────────────────────────────────────────────────────────────────────
label {
    monitor =
    text     = 󰌾  Krypt-Stick einlegen  ·  oder  ·  PIN eingeben
    color    = rgba(108, 112, 134, 0.80)   # MOCHA_OVERLAY0
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, -200
    halign   = center
    valign   = center
}
