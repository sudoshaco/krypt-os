# ~/.config/hypr/hypridle.conf — Krypt OS Idle Daemon
# hypridle: https://github.com/hyprwm/hypridle
#
# Timing-Philosophie für Krypt OS (knapper als die meisten Distros, weil
# das System für sensible Workloads gedacht ist):
#   2:00 — KRYPT-Screensaver (foot + tte) startet
#   2:30 — Bildschirm wird via hyprlock gesperrt
#   5:00 — Display aus (DPMS off, spart Strom & verhindert Shoulder-Surfing)
#   vor Suspend — sperren bevor das System einschläft (Cold-Boot-Schutz)
#
# Krypt-Stick bleibt parallel aktiv: krypt-daemon erkennt das Entfernen des
# Sticks unabhängig von hypridle und löst Panic-Mode aus (siehe daemon.toml
# panic_level).

general {
    lock_cmd           = pidof hyprlock || hyprlock
    before_sleep_cmd   = loginctl lock-session
    after_sleep_cmd    = sleep 1 && hyprctl dispatch dpms on
    # ignore_dbus_inhibit = false — Media-Players (mpv etc.) dürfen den
    # Idle-Timer per dbus inhibieren, sonst springt der Screensaver mitten
    # in einem Vortrag/Video.
    ignore_dbus_inhibit = false
    inhibit_sleep      = 3
}

# Screensaver-Auslöser — nur wenn hyprlock noch nicht aktiv ist
listener {
    timeout    = 120
    on-timeout = pidof hyprlock || krypt-launch-screensaver
}

# Hard-Lock — auch wenn der Screensaver vom User abgebrochen wurde
listener {
    timeout    = 150
    on-timeout = loginctl lock-session
}

# Display abschalten — wartet bis lock + Screensaver-Phase vorbei sind
listener {
    timeout    = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}
