# Krypt OS — Zentrale Farbpalette
# Basis: Catppuccin Mocha | Primärer Akzent: Krypt-Violett (#9d4edd)
#
# Verwendung in Bash-Scripts: source ~/.config/krypt/colors.conf
# Verwendung in Hyprland:     via rgba()-Werte direkt (keine Variablen)
# Verwendung in CSS:          via CSS-Custom-Properties in style.css
# Verwendung in foot/rofi:    direkt in deren Konfigurationen

# ─────────────────────────────────────────────────────────────────────────────
# KRYPT VIOLETT — primärer Akzent (ersetzt Catppuccin Mauve)
# Tiefer, dramatischer als #cba6f7 — macht Krypt unverwechselbar
# ─────────────────────────────────────────────────────────────────────────────
KRYPT_VIOLET="#9d4edd"
KRYPT_VIOLET_DARK="#7b2fbe"
KRYPT_VIOLET_LIGHT="#c77dff"
KRYPT_VIOLET_DIM="#6a0dad"
KRYPT_VIOLET_GLOW="#e0aaff"

# ─────────────────────────────────────────────────────────────────────────────
# CATPPUCCIN MOCHA BASE
# ─────────────────────────────────────────────────────────────────────────────
MOCHA_CRUST="#11111b"
MOCHA_MANTLE="#181825"
MOCHA_BASE="#1e1e2e"
MOCHA_SURFACE0="#313244"
MOCHA_SURFACE1="#45475a"
MOCHA_SURFACE2="#585b70"
MOCHA_OVERLAY0="#6c7086"
MOCHA_OVERLAY1="#7f849c"
MOCHA_OVERLAY2="#9399b2"
MOCHA_SUBTEXT0="#a6adc8"
MOCHA_SUBTEXT1="#bac2de"
MOCHA_TEXT="#cdd6f4"

# ─────────────────────────────────────────────────────────────────────────────
# CATPPUCCIN MOCHA AKZENTE
# ─────────────────────────────────────────────────────────────────────────────
MOCHA_LAVENDER="#b4befe"
MOCHA_BLUE="#89b4fa"
MOCHA_SAPPHIRE="#74c7ec"
MOCHA_SKY="#89dceb"
MOCHA_TEAL="#94e2d5"
MOCHA_GREEN="#a6e3a1"
MOCHA_YELLOW="#f9e2af"
MOCHA_PEACH="#fab387"
MOCHA_MAROON="#eba0ac"
MOCHA_RED="#f38ba8"
MOCHA_PINK="#f5c2e7"
MOCHA_FLAMINGO="#f2cdcd"
MOCHA_ROSEWATER="#f5e0dc"
# Mauve ersetzt durch KRYPT_VIOLET:
MOCHA_MAUVE="#cba6f7"  # Original — nicht verwenden, KRYPT_VIOLET bevorzugen

# ─────────────────────────────────────────────────────────────────────────────
# SEMANTISCH: VM Trust-Level Border-Farben
# (müssen mit hyprland.conf windowrulev2 bordercolor übereinstimmen)
# ─────────────────────────────────────────────────────────────────────────────
TRUST_GREEN_BRIGHT="#a6e3a1"    # Trusted VMs (work, personal)
TRUST_GREEN_DIM="#40a02b"
TRUST_YELLOW_BRIGHT="#f9e2af"   # Medium-Trust VMs
TRUST_YELLOW_DIM="#df8e1d"
TRUST_ORANGE_BRIGHT="#fab387"   # Low-Trust VMs (social, gaming)
TRUST_ORANGE_DIM="#fe640b"
TRUST_RED_BRIGHT="#f38ba8"      # Untrusted VMs (browser, unknown)
TRUST_RED_DIM="#e64553"
TRUST_BLACK_BRIGHT="#cba6f7"    # Vault (lila statt schwarz für Sichtbarkeit)
TRUST_BLACK_DIM="#8839ef"
TRUST_BLUE_BRIGHT="#89b4fa"     # System VMs (sys-gui, sys-usb, sys-net)
TRUST_BLUE_DIM="#1e66f5"

# ─────────────────────────────────────────────────────────────────────────────
# TRANSPARENZEN (für Waybar, Rofi-Hintergrund, Hyprland-Schatten)
# ─────────────────────────────────────────────────────────────────────────────
ALPHA_HIGH="ee"      # 93% — fast opaque (Waybar, Menüs)
ALPHA_MED="cc"       # 80% — semi-transparent (Tooltips)
ALPHA_LOW="88"       # 53% — leicht transparent (Borders inactive)
ALPHA_DIM="44"       # 27% — stark transparent (Schatten)
