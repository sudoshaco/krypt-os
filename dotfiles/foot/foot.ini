# ~/.config/foot/foot.ini — Krypt OS Terminal
# foot: https://codeberg.org/dnkl/foot
# Theme: Catppuccin Mocha + Krypt-Violett Cursor

[main]
term          = xterm-256color
font          = JetBrainsMono Nerd Font:size=12
font-bold     = JetBrainsMono Nerd Font:weight=Bold:size=12
font-italic   = JetBrainsMono Nerd Font:slant=italic:size=12
dpi-aware     = yes
pad           = 12x10

# Shell (dom0: bash; AppVMs erben von der VM-Konfiguration)
shell         = /bin/bash

# Performance
scrollback-lines  = 10000
workers           = 4

# Clipboard-Sicherheit: kein automatisches Einfügen von primärer Selektion
# (Verhindert unbeabsichtigte Cross-VM Clipboard-Leaks)
selection-target  = none

[cursor]
style    = beam
blink    = yes
color    = 9d4edd cdd6f4    # krypt-violet | text

[mouse]
hide-when-typing = yes

[colors]
# ── Catppuccin Mocha ────────────────────────────────────────────────────────
background = 1e1e2e    # MOCHA_BASE
foreground = cdd6f4    # MOCHA_TEXT

# Selektion: Krypt-Violett Hintergrund
selection-background = 9d4edd
selection-foreground = 1e1e2e

# Standard 8 Farben (Ansi 0–7)
regular0   = 45475a    # surface1       (Schwarz)
regular1   = f38ba8    # MOCHA_RED
regular2   = a6e3a1    # MOCHA_GREEN
regular3   = f9e2af    # MOCHA_YELLOW
regular4   = 89b4fa    # MOCHA_BLUE
regular5   = 9d4edd    # KRYPT_VIOLET   (statt MOCHA_MAUVE)
regular6   = 94e2d5    # MOCHA_TEAL
regular7   = bac2de    # MOCHA_SUBTEXT1

# Helle 8 Farben (Ansi 8–15)
bright0    = 585b70    # MOCHA_SURFACE2
bright1    = f38ba8    # MOCHA_RED
bright2    = a6e3a1    # MOCHA_GREEN
bright3    = f9e2af    # MOCHA_YELLOW
bright4    = 89b4fa    # MOCHA_BLUE
bright5    = c77dff    # KRYPT_VIOLET_LIGHT
bright6    = 89dceb    # MOCHA_SKY
bright7    = cdd6f4    # MOCHA_TEXT (full brightness)

# Dim-Farben (für weniger wichtige Ausgaben)
dim0       = 313244
dim1       = c77dff

[key-bindings]
# Krypt: Clipboard-Transfer explizit (kein Ctrl+Shift+C Auto)
copy-to-clipboard     = Control+Shift+c
paste-from-clipboard  = Control+Shift+v
search-start          = Control+Shift+f
font-increase         = Control+equal
font-decrease         = Control+minus
font-reset            = Control+0
fullscreen            = F11
scroll-up-page        = Control+Page_Up
scroll-down-page      = Control+Page_Down

[scrollback]
# Suche im Scrollback (foot nativ, kein tmux nötig für einfache Fälle)
indicator-position = relative
indicator-format   = line

[tweak]
# Subpixel-Rendering für scharfe Schrift auf HiDPI
font-monospace-warn = false
grapheme-shaping    = yes
overline-position   = -1
