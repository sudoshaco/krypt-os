# ~/.config/foot/screensaver.ini — Krypt OS Screensaver Terminal
#
# Eigene Foot-Config nur für den Screensaver:
# - Großer Font, damit das ASCII-Logo auf 4K-Displays nicht winzig wirkt
# - Reines Schwarz (kein Catppuccin-Background), damit tte-Animationen
#   nicht durch farbige Surface-Pixel "verwaschen".
# - Cursor unsichtbar, kein Padding, keine Audio-Bell.

[main]
term          = xterm-256color
font          = JetBrainsMono Nerd Font:size=18
font-bold     = JetBrainsMono Nerd Font:weight=Bold:size=18
dpi-aware     = yes
pad           = 0x0

[cursor]
style    = beam
blink    = no
color    = 000000 000000

[mouse]
hide-when-typing = yes

[colors]
background = 000000
foreground = cdd6f4
alpha      = 1.0

[bell]
urgent     = no
notify     = no

[scrollback]
lines = 0
