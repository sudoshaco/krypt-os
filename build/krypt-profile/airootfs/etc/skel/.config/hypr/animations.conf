# animations.conf — Krypt OS Hyprland Animationen
# source = ~/.config/hypr/animations.conf
#
# Designprinzip: schnell rein, weich raus — professionell, kein Gimmick.
# Vault-Workspace (ws9) hat no-anim (in hyprland.conf via windowrulev2).

animations {
    enabled = true

    # ─────────────────────────────────────────────────────────────────────────
    # BEZIER-KURVEN
    # ─────────────────────────────────────────────────────────────────────────

    # krypt — leichter Overshoot: Fenster "rasten" ein, fühlen sich physisch an
    bezier = krypt,       0.05, 0.9, 0.1, 1.05

    # krypt_fast — keine Überschwingung: für UI-Elemente die responsiv wirken sollen
    bezier = krypt_fast,  0.25, 0.46, 0.45, 0.94

    # krypt_out — stark ausschwingende Kurve: weiche Layer-Animationen
    bezier = krypt_out,   0.16, 1.0, 0.3, 1.0

    # krypt_snap — sehr schnell, minimal: für Security-kritische UI (Vault-Bestätigung)
    bezier = krypt_snap,  0.76, 0.0, 0.24, 1.0

    # linear — für Fade ohne Beschleunigung
    bezier = krypt_linear, 1.0, 1.0, 0.0, 0.0

    # ─────────────────────────────────────────────────────────────────────────
    # FENSTER-ANIMATIONEN
    # ─────────────────────────────────────────────────────────────────────────

    # Fenster öffnen — slide from bottom + krypt Overshoot
    animation = windowsIn,   1, 4, krypt,      slide

    # Fenster schließen — schnell weg, popin 88% (leicht schrumpfen)
    animation = windowsOut,  1, 3, krypt_fast, popin 88%

    # Fenster verschieben (drag, move to workspace)
    animation = windowsMove, 1, 3, krypt_fast

    # ─────────────────────────────────────────────────────────────────────────
    # WORKSPACE-ANIMATIONEN
    # ─────────────────────────────────────────────────────────────────────────

    # Horizontale Workspaces (1–8) — slide links/rechts
    animation = workspaces,        1, 5, krypt_out, slide

    # Vault (ws9) und Special — slidevert (von unten, bewusst anders)
    animation = specialWorkspace,  1, 4, krypt,     slidevert

    # ─────────────────────────────────────────────────────────────────────────
    # FADE-ANIMATIONEN
    # ─────────────────────────────────────────────────────────────────────────

    animation = fade,       1, 4, krypt_fast
    animation = fadeIn,     1, 4, krypt
    animation = fadeOut,    1, 3, krypt_fast

    # ─────────────────────────────────────────────────────────────────────────
    # LAYER-ANIMATIONEN (Waybar, Rofi, Dunst, Hyprlock)
    # ─────────────────────────────────────────────────────────────────────────

    # Waybar, Notifications — slide from top/bottom
    animation = layers,         1, 3, krypt_fast, slide
    animation = fadeLayersIn,   1, 3, krypt
    animation = fadeLayersOut,  1, 2, krypt_fast

    # ─────────────────────────────────────────────────────────────────────────
    # BORDER — langsam rotierender Gradient für aktive Fenster
    # ─────────────────────────────────────────────────────────────────────────
    animation = border,      1, 8, krypt_linear
    animation = borderangle, 1, 180, krypt_linear, loop
}
