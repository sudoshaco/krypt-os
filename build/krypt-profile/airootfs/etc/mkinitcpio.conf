# /etc/mkinitcpio.conf — Krypt OS (installiertes System)
#
# Diese Datei wird vom Installer nach /mnt/etc/mkinitcpio.conf kopiert.
# Danach wird mkinitcpio -P im arch-chroot ausgeführt.
#
# HOOKS-Reihenfolge:
#   base       — minimale BusyBox-Utilities
#   udev       — udevd + by-id/ Symlinks (USB-Stick-Erkennung!)
#   autodetect — Initramfs auf erkannte Module reduzieren (installed system)
#   modconf    — Modul-Konfiguration aus /etc/modprobe.d/
#   block      — Block-Device-Module laden
#   keyboard   — Tastatur für Passwort-Eingabe (Fallback wenn kein Stick)
#   krypt      — USB-Stick Auth-Hook: liest 64-Byte-Key ab Offset 512
#   encrypt    — LUKS2 Standard-Hook (Fallback via cryptdevice= Cmdline)
#   lvm2       — LVM-Unterstützung (für AppVM-Volumes später)
#   filesystems — Root-Filesystem mounten
#   fsck       — Dateisystem-Check

MODULES=(xen-blkfront xen-netfront xen-fbfront xen-kbdfront dm_crypt aes sha256)

BINARIES=(cryptsetup dd udevadm blkid)

FILES=(/etc/crypttab)

HOOKS=(base udev autodetect modconf block keyboard krypt encrypt lvm2 filesystems fsck)
